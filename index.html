<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد الاشتراكات التقنية</title>
<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ================================================================
  // ضع هنا بيانات مشروع Firebase الخاص بك
  // احصل عليها من: Firebase Console > Project Settings > Your apps
  // ================================================================
  const firebaseConfig = {
    apiKey: "REPLACE_WITH_YOUR_API_KEY",
    authDomain: "REPLACE_WITH_YOUR_AUTH_DOMAIN",
    projectId: "REPLACE_WITH_YOUR_PROJECT_ID",
    storageBucket: "REPLACE_WITH_YOUR_STORAGE_BUCKET",
    messagingSenderId: "REPLACE_WITH_YOUR_MESSAGING_SENDER_ID",
    appId: "REPLACE_WITH_YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // خريطة تحويل حقول Firestore -> حقول الداشبورد
  function docToSub(doc) {
    const d = doc.data();
    return {
      id:     doc.id,
      name:   d.systemName   || '',
      company:d.company      || '',
      freq:   d.paymentMethod|| 'monthly',
      amount: d.amountSar    || 0,
      usd:    d.amountUsd    || '-',
      end:    d.expiryDate   || '-',
      status: d.status       || 'active',
    };
  }

  // الاستماع الفوري للتغييرات من Firestore
  const q = query(collection(db, 'subscriptions'), orderBy('createdAt', 'asc'));
  onSnapshot(q, (snapshot) => {
    window._subs = snapshot.docs.map(docToSub);
    if(typeof window._refresh === 'function') window._refresh();
  }, (err) => {
    console.warn('Firestore error:', err.message);
    // fallback: استخدم البيانات المحلية إن فشل الاتصال
    if(!window._subs || window._subs.length === 0){
      window._subs = window._defaultSubs || [];
      if(typeof window._refresh === 'function') window._refresh();
    }
  });
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--dark:#0D1B2A;--dark2:#1B2D40;--dark3:#243447;--blue:#1E6FD9;--blue2:#2E8AF6;--accent:#00C9B1;--accent2:#FFB347;--red:#FF5B5B;--green:#4CD97B;--text:#E8F0FE;--muted:#8FA8C8;--border:rgba(255,255,255,0.07);--card:rgba(255,255,255,0.04);}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;direction:rtl}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(30,111,217,.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(0,201,177,.08) 0%,transparent 60%);pointer-events:none;z-index:0}
.wrap{max-width:1200px;margin:0 auto;padding:28px 24px;position:relative;z-index:1}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:10px}
.header-left h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.header-left p{font-size:13px;color:var(--muted);margin-top:3px}
/* زر دخول الأدمن */
.btn-admin{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;border:1px solid rgba(255,179,71,.4);background:rgba(255,179,71,.1);color:var(--accent2);font-size:13px;font-family:'Cairo',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-admin:hover{background:rgba(255,179,71,.2);border-color:rgba(255,179,71,.7);transform:translateY(-1px)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s}
.metric:hover{border-color:rgba(255,255,255,.15)}
.metric::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 14px 0 60px;opacity:.15}
.metric.m-blue::before{background:var(--blue2)}.metric.m-green::before{background:var(--green)}.metric.m-accent::before{background:var(--accent)}.metric.m-orange::before{background:var(--accent2)}
.metric-icon{font-size:18px;margin-bottom:10px}
.metric-value{font-size:26px;font-weight:700;line-height:1}
.metric-label{font-size:12px;color:var(--muted);margin-top:5px}
.metric-sub{font-size:11px;margin-top:3px;opacity:.7}
.alerts{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.alert-card{border-radius:12px;padding:14px 16px;border:1px solid}
.a-warn{background:rgba(255,179,71,.08);border-color:rgba(255,179,71,.3)}.a-red{background:rgba(255,91,91,.08);border-color:rgba(255,91,91,.3)}.a-teal{background:rgba(0,201,177,.08);border-color:rgba(0,201,177,.3)}
.alert-title{font-size:12px;font-weight:600;margin-bottom:5px}
.a-warn .alert-title{color:var(--accent2)}.a-red .alert-title{color:var(--red)}.a-teal .alert-title{color:var(--accent)}
.alert-body{font-size:11px;color:var(--muted);line-height:1.6}
.filters-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:20px}
.filter-group{margin-bottom:10px}.filter-group:last-child{margin-bottom:0}
.filter-label{font-size:11px;color:var(--muted);margin-bottom:7px;font-weight:500}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:5px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--muted);font-size:12px;font-family:'Cairo',sans-serif;cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:rgba(255,255,255,.25);color:var(--text)}
.fbtn.fs-active{background:var(--blue);border-color:var(--blue);color:#fff}
.fbtn.fc-active{background:var(--accent);border-color:var(--accent);color:var(--dark)}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
.chart-card h3{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.legend span{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.ldot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:20px;overflow-x:auto}
.table-card h3{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.results-count{font-size:11px;color:var(--muted);margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:right;padding:10px 12px;color:var(--muted);font-weight:500;font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
td{text-align:right;padding:10px 12px;color:var(--text);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.03)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-active{background:rgba(76,217,123,.15);color:#4CD97B;border:1px solid rgba(76,217,123,.3)}
.b-stopped{background:rgba(255,91,91,.15);color:#FF5B5B;border:1px solid rgba(255,91,91,.3)}
.b-monthly{background:rgba(30,111,217,.2);color:#7DB8F7;border:1px solid rgba(30,111,217,.3)}
.b-quarterly{background:rgba(255,179,71,.15);color:#FFB347;border:1px solid rgba(255,179,71,.3)}
.b-yearly{background:rgba(0,201,177,.15);color:#00C9B1;border:1px solid rgba(0,201,177,.3)}
.chart-full{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:24px}
.chart-full h3{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
/* Loading */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.loading-spinner{display:inline-block;width:24px;height:24px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;font-size:11px;color:var(--muted);padding-top:8px;opacity:.5}
</style>
</head>
<body>
<div class="wrap">
  <!-- Header: عرض + زر دخول الأدمن فقط -->
  <div class="header">
    <div class="header-left">
      <h1>لوحة متابعة الاشتراكات التقنية</h1>
      <p>آخر تحديث: مايو 2026</p>
    </div>
    <a class="btn-admin" href="admin.html">🔐 دخول الأدمن</a>
  </div>

  <!-- البطاقات الإحصائية -->
  <div class="metrics" id="metrics">
    <div class="loading"><span class="loading-spinner"></span> جاري التحميل...</div>
  </div>

  <!-- التنبيهات -->
  <div class="alerts" id="alerts"></div>

  <!-- الفلاتر -->
  <div class="filters-card">
    <div class="filter-group">
      <div class="filter-label">الحالة / طريقة الدفع</div>
      <div class="filter-row" id="statusFilters"></div>
    </div>
    <div class="filter-group">
      <div class="filter-label">الشركة</div>
      <div class="filter-row" id="companyFilters"></div>
    </div>
  </div>

  <!-- الرسوم البيانية -->
  <div class="charts-row">
    <div class="chart-card">
      <h3>توزيع التكلفة</h3>
      <div class="legend" id="pieLegend"></div>
      <div style="position:relative;height:200px"><canvas id="pieChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>الإجمالي حسب طريقة الدفع</h3>
      <div style="position:relative;height:220px"><canvas id="barChart"></canvas></div>
    </div>
  </div>

  <!-- جدول الاشتراكات (عرض فقط — لا أزرار تعديل/حذف) -->
  <div class="table-card">
    <h3>جميع الاشتراكات</h3>
    <div class="results-count" id="resultsCount"></div>
    <table>
      <thead>
        <tr>
          <th>النظام</th><th>الشركة</th><th>الدفع</th>
          <th>المبلغ (ر.س)</th><th>بالدولار</th><th>الانتهاء</th><th>الحالة</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- رسم المقارنة -->
  <div class="chart-full">
    <h3>مقارنة تكلفة الأنظمة (ر.س)</h3>
    <div id="hbarWrap" style="position:relative"><canvas id="hbarChart"></canvas></div>
  </div>

  <div class="footer">داشبورد الاشتراكات التقنية — للعرض العام</div>
</div>

<script>
// ============================================================
// بيانات افتراضية (تُستخدم كـ fallback إذا فشل Firestore)
// ============================================================
window._defaultSubs = [
  {name:'فيسثنيثر',        company:'دي بالر',           freq:'yearly',   amount:1435, usd:'382.67$', end:'11/04/2027',status:'active'},
  {name:'ادارتي',           company:'دي بالر',           freq:'quarterly',amount:6,    usd:'-',       end:'-',         status:'active'},
  {name:'الوزاب',           company:'دي بالر (مبيعات)', freq:'monthly',  amount:270,  usd:'72$',     end:'01/12/2025',status:'active'},
  {name:'فارزيو',           company:'دي بالر عقليات',   freq:'monthly',  amount:0,    usd:'-',       end:'-',         status:'active'},
  {name:'فات سي آر إن',    company:'سنيتي سايد',        freq:'monthly',  amount:0,    usd:'-',       end:'16/12/2025',status:'stopped'},
  {name:'دواتر — حسابات',  company:'دي بالر',           freq:'yearly',   amount:13180,usd:'-',       end:'-',         status:'active'},
  {name:'دواتر — ERP',     company:'دي بالر',           freq:'yearly',   amount:4554, usd:'-',       end:'-',         status:'active'},
  {name:'بتروس',            company:'دي بالر',           freq:'quarterly',amount:2250, usd:'600$',    end:'20/07/2026',status:'active'},
  {name:'الدو',             company:'دي بالر',           freq:'yearly',   amount:6888, usd:'1,836$',  end:'21/10/2026',status:'active'},
  {name:'سيرور أندو',       company:'دي بالر',           freq:'monthly',  amount:28,   usd:'7.60$',   end:'-',         status:'active'},
  {name:'الطاقات (الخطوط)',company:'الخطوط المتتالية',  freq:'yearly',   amount:99,   usd:'-',       end:'27/08/2026',status:'active'},
  {name:'الطاقات (سنيتي)', company:'سنيتي سايد',        freq:'yearly',   amount:99,   usd:'-',       end:'18/04/2025',status:'active'},
  {name:'الطاقات (دي بالر)',company:'دي بالر',           freq:'yearly',   amount:99,   usd:'-',       end:'30/12/2026',status:'active'},
  {name:'سيد بوس',          company:'فيون العربية',      freq:'monthly',  amount:0,    usd:'-',       end:'01/12/2025',status:'stopped'},
  {name:'الوزاب (عقليات)', company:'دي بالر (عقليات)', freq:'monthly',  amount:270,  usd:'72$',     end:'20/12/2025',status:'stopped'},
];
window._subs = window._defaultSubs.slice();

const COLORS=['#1E6FD9','#00C9B1','#FFB347','#4CD97B','#FF5B5B','#7B61FF','#2E8AF6','#FF8C42','#00E5CC','#A8FF78'];
const freqLabel={monthly:'شهري',quarterly:'ربع سنوي',yearly:'سنوي'};
const freqBadge={monthly:'b-monthly',quarterly:'b-quarterly',yearly:'b-yearly'};
let activeStatus='all', activeCompany='all';
let pieChart, barChart, hbarChart;

function getFiltered(){
  return window._subs.filter(s=>{
    const sOk=activeStatus==='all'||s.status===activeStatus||s.freq===activeStatus;
    const cOk=activeCompany==='all'||s.company===activeCompany;
    return sOk&&cOk;
  });
}

function renderMetrics(f){
  const active=f.filter(s=>s.status==='active').length;
  const stopped=f.filter(s=>s.status==='stopped').length;
  const yearly=f.filter(s=>s.freq==='yearly').reduce((a,s)=>a+s.amount,0);
  const monthly=f.filter(s=>s.freq==='monthly').reduce((a,s)=>a+s.amount,0);
  document.getElementById('metrics').innerHTML=
    `<div class="metric m-blue"><div class="metric-icon">📦</div><div class="metric-value">${f.length}</div><div class="metric-label">إجمالي الأنظمة</div><div class="metric-sub">من أصل ${window._subs.length}</div></div>
     <div class="metric m-green"><div class="metric-icon">✅</div><div class="metric-value" style="color:var(--green)">${active}</div><div class="metric-label">الأنظمة النشطة</div><div class="metric-sub">${stopped} متوقفة</div></div>
     <div class="metric m-accent"><div class="metric-icon">📅</div><div class="metric-value" style="color:var(--accent2)">${yearly.toLocaleString()}</div><div class="metric-label">الإجمالي السنوي</div><div class="metric-sub">ريال سعودي</div></div>
     <div class="metric m-orange"><div class="metric-icon">📆</div><div class="metric-value">${monthly.toLocaleString()}</div><div class="metric-label">الإجمالي الشهري</div><div class="metric-sub">ريال سعودي</div></div>`;
}

function renderAlerts(){
  const subs=window._subs;
  const stopped=subs.filter(s=>s.status==='stopped');
  const byCompany={};
  subs.forEach(s=>{byCompany[s.company]=(byCompany[s.company]||0)+s.amount;});
  const topCo=Object.entries(byCompany).sort((a,b)=>b[1]-a[1])[0]||['—',0];
  const today=new Date();
  const upcoming=subs.filter(s=>s.end&&s.end!=='-').map(s=>{
    const[d,m,y]=s.end.split('/');
    return{name:s.name,date:new Date(`${y}-${m}-${d}`),dateStr:s.end};
  }).filter(s=>s.date>today).sort((a,b)=>a.date-b.date).slice(0,2);
  const upHTML=upcoming.length?upcoming.map(u=>`${u.name} — ${u.dateStr}`).join('<br>'):'لا توجد تجديدات قادمة';
  document.getElementById('alerts').innerHTML=
    `<div class="alert-card a-warn"><div class="alert-title">⏰ تجديد قادم</div><div class="alert-body">${upHTML}</div></div>
     <div class="alert-card a-red"><div class="alert-title">❌ أنظمة متوقفة (${stopped.length})</div><div class="alert-body">${stopped.map(s=>s.name).join('<br>')||'لا توجد'}</div></div>
     <div class="alert-card a-teal"><div class="alert-title">🏆 أعلى شركة تكلفةً</div><div class="alert-body">${topCo[0]}<br><strong>${topCo[1].toLocaleString()} ر.س</strong></div></div>`;
}

function renderFilters(){
  const subs=window._subs;
  const opts=[{val:'all',label:'الكل'},{val:'active',label:'النشطة'},{val:'stopped',label:'المتوقفة'},{val:'yearly',label:'سنوي'},{val:'monthly',label:'شهري'},{val:'quarterly',label:'ربع سنوي'}];
  document.getElementById('statusFilters').innerHTML=opts.map(o=>`<button class="fbtn${activeStatus===o.val?' fs-active':''}" onclick="setStatus('${o.val}')">${o.label}</button>`).join('');
  const companies=['all',...Array.from(new Set(subs.map(s=>s.company))).sort()];
  document.getElementById('companyFilters').innerHTML=companies.map(c=>{
    const label=c==='all'?'الكل':c;
    const count=c==='all'?subs.length:subs.filter(s=>s.company===c).length;
    return `<button class="fbtn${activeCompany===c?' fc-active':''}" onclick="setCompany('${c}')">${label} (${count})</button>`;
  }).join('');
}

// الجدول — بدون أزرار تعديل/حذف
function renderTable(f){
  document.getElementById('resultsCount').textContent=`${f.length} نتيجة من أصل ${window._subs.length}`;
  document.getElementById('tableBody').innerHTML=f.length===0
    ?`<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:24px">لا توجد نتائج</td></tr>`
    :f.map(s=>`<tr>
      <td style="font-weight:600">${s.name}</td>
      <td style="color:var(--muted)">${s.company}</td>
      <td><span class="badge ${freqBadge[s.freq]}">${freqLabel[s.freq]}</span></td>
      <td style="font-weight:500">${s.amount>0?s.amount.toLocaleString():'—'}</td>
      <td style="color:var(--muted)">${s.usd}</td>
      <td style="color:var(--muted)">${s.end||'-'}</td>
      <td><span class="badge ${s.status==='active'?'b-active':'b-stopped'}">${s.status==='active'?'نشط':'متوقف'}</span></td>
    </tr>`).join('');
}

function renderPie(f){
  const data=f.filter(s=>s.amount>0).sort((a,b)=>b.amount-a.amount).slice(0,8);
  const total=data.reduce((s,d)=>s+d.amount,0);
  document.getElementById('pieLegend').innerHTML=data.map((d,i)=>
    `<span><span class="ldot" style="background:${COLORS[i%COLORS.length]}"></span>${d.name} ${total?Math.round(d.amount/total*100):0}%</span>`
  ).join('');
  if(pieChart)pieChart.destroy();
  pieChart=new Chart(document.getElementById('pieChart'),{
    type:'doughnut',
    data:{labels:data.map(d=>d.name),datasets:[{data:data.map(d=>d.amount),backgroundColor:data.map((_,i)=>COLORS[i%COLORS.length]),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw.toLocaleString()} ر.س`}}}}
  });
}

function renderBar(f){
  const m=f.filter(s=>s.freq==='monthly').reduce((a,s)=>a+s.amount,0);
  const q=f.filter(s=>s.freq==='quarterly').reduce((a,s)=>a+s.amount,0);
  const y=f.filter(s=>s.freq==='yearly').reduce((a,s)=>a+s.amount,0);
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:['شهري','ربع سنوي','سنوي'],datasets:[{data:[m,q,y],backgroundColor:['#1E6FD9','#00C9B1','#FFB347'],borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw.toLocaleString()} ر.س`}}},
      scales:{x:{ticks:{color:'#8FA8C8',font:{size:11,family:'Cairo'}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#8FA8C8',font:{size:11,family:'Cairo'},callback:v=>v.toLocaleString()},grid:{color:'rgba(255,255,255,0.05)'}}}}
  });
}

function renderHbar(f){
  const data=f.filter(s=>s.amount>0).sort((a,b)=>b.amount-a.amount);
  document.getElementById('hbarWrap').style.height=Math.max(160,data.length*38+60)+'px';
  if(hbarChart)hbarChart.destroy();
  hbarChart=new Chart(document.getElementById('hbarChart'),{
    type:'bar',
    data:{labels:data.map(s=>s.name),datasets:[{data:data.map(s=>s.amount),backgroundColor:data.map((_,i)=>COLORS[i%COLORS.length]),borderRadius:5,borderSkipped:false}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw.toLocaleString()} ر.س`}}},
      scales:{x:{ticks:{color:'#8FA8C8',font:{size:11,family:'Cairo'},callback:v=>v.toLocaleString()},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#E8F0FE',font:{size:11,family:'Cairo'}},grid:{display:false}}}}
  });
}

window._refresh = function(){
  const f=getFiltered();
  renderMetrics(f);renderAlerts();renderFilters();renderTable(f);renderPie(f);renderBar(f);renderHbar(f);
};

function setStatus(v){activeStatus=v;window._refresh();}
function setCompany(v){activeCompany=v;window._refresh();}

// تشغيل أولي
window._refresh();
</script>
